name = "Expo"
grammar = "expo"
path_suffixes = ["expo"]
line_comments = ["# "]
autoclose_before = ";:.,=}])>"
tab_size = 2

# Zed's auto-pair rules. The `not_in` lists prevent the editor from
# inserting closing brackets when the cursor is inside a string or
# comment, where they would otherwise be wrong.
[[brackets]]
start = "{"
end = "}"
close = true
newline = true
not_in = ["string", "comment"]

[[brackets]]
start = "("
end = ")"
close = true
newline = true
not_in = ["string", "comment"]

[[brackets]]
start = "["
end = "]"
close = true
newline = true
not_in = ["string", "comment"]

[[brackets]]
start = "<<"
end = ">>"
close = true
newline = false
not_in = ["string", "comment"]

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["string", "comment"]

[[brackets]]
start = "\"\"\""
end = "\"\"\""
close = true
newline = true
not_in = ["string", "comment"]
