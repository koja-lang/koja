services:
  db:
    image: postgres:16
    container_name: shortener-db
    environment:
      POSTGRES_PASSWORD: shortener
      POSTGRES_USER: postgres
      POSTGRES_DB: shortener
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shortener"]
      interval: 2s
      timeout: 3s
      retries: 15
