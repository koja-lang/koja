<!DOCTYPE html>
<html lang="en">
<head>
  <title>Expo Docs</title>
  {% include "head.html" %}
</head>
<body>

{% include "theme_toggle.html" %}
{% include "sidebar.html" %}

<main class="content">
  <h1>API Reference</h1>

  <div class="item-list">
    {% for item in items %}
    <div class="item-row">
      <span class="type-chip chip-{{ item.kind }}">{{ item.kind }}</span>
      <a class="item-name" href="{{ item.name }}.html">{{ item.name }}</a>
      {% if let Some(doc) = item.doc %}<span class="item-brief">{{ doc|brief }}</span>{% endif %}
    </div>
    {% endfor %}
  </div>
</main>

</body>
</html>
