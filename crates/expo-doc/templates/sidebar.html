<nav class="sidebar">
  <h1>Expo</h1>

  <ul class="sidebar-items">
    {% for item in all_items %}
    <li>
      <a class="sidebar-item{% if let Some(active) = active_item %}{% if item.name == *active %} active{% endif %}{% endif %}" href="{{ item.name }}.html">
        <span class="sidebar-item-name">{{ item.name }}</span>
        <span class="type-chip chip-{{ item.kind }}">{{ item.kind }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</nav>
