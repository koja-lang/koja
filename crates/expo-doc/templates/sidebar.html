<nav class="sidebar">
  <h1>Expo</h1>

  <h2>Modules</h2>
  <ul>
    {% for m in all_modules %}
    <li>
      <a href="{% if is_item_page %}../{% endif %}{{ m.name }}.html"{% if m.name == *module_name %} class="active"{% endif %}>{{ m.name }}</a>
      {% if m.name == *module_name %}
      <ul class="sidebar-items">
        {% for item in m.items %}
        <li>
          <a class="sidebar-item{% if let Some(active) = active_item %}{% if item.name == *active %} active{% endif %}{% endif %}" href="{% if is_item_page %}{% else %}{{ module_name }}/{% endif %}{{ item.name }}.html">
            <span class="sidebar-item-name">{{ item.name }}</span>
            <span class="type-chip chip-{{ item.kind }}">{{ item.kind }}</span>
          </a>
        </li>
        {% endfor %}
      </ul>
      {% endif %}
    </li>
    {% endfor %}
  </ul>
</nav>
