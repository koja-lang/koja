[package]
name = "expo-driver"
description = "CLI frontend for the Expo language compiler"
edition.workspace = true
license.workspace = true
version.workspace = true

[[bin]]
name = "expo"
path = "src/main.rs"

[dependencies]
expo-runtime = { path = "../expo-runtime" }
expo-ast = { path = "../expo-ast" }
expo-codegen = { path = "../expo-codegen" }
expo-doc = { path = "../expo-doc" }
expo-fmt = { path = "../expo-fmt" }
expo-lexer = { path = "../expo-lexer" }
expo-parser = { path = "../expo-parser" }
expo-stdlib = { path = "../expo-stdlib" }
expo-typecheck = { path = "../expo-typecheck" }
clap = { version = "4.6.0", features = ["derive"] }
